<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>เพลงสำหรับเธอ</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="container">
    <div class="shell center">
      <h1>เพลงสำหรับเธอ</h1>
      <h3>ทุกปี - LingRom</h3>

        <!-- แผ่นเสียง -->
        <div class="vinyl-wrap">
          <img src="assets/vinyl.png" class="vinyl" id="vinyl">
        </div>

        <!-- progress -->
        <div class="progress-box">
          <span id="currentTime">00:00</span>
          <input type="range" id="progress" value="0" min="0" step="1" />
          <span id="duration">00:00</span>
        </div>

        <!-- ปุ่ม -->
        <div class="button-row">
          <button class="btn" id="playBtn">▶ เล่นเพลง</button>
          <a class="btn secondary" href="menu.html">ย้อนกลับ</a>
        </div>

        <audio id="music">
          <source src="assets/song.mp3" type="audio/mpeg">
        </audio>

      </div>
    </div>
  </div>

  <script src="js/music.js"></script>
</body>
</html>
